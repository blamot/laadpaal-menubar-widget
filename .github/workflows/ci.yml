name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  python-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -r laadpaal_checker/requirements.txt
      - name: CLI help
        run: python laadpaal_checker/check_status.py --help

  swift-menubar:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Swift menubar app
        run: swift build
        working-directory: menubar_app
